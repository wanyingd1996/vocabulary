<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      color: #1a1a2e;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    /* ── Login screen ── */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 60px;
    }

    #loginScreen p {
      color: #666;
      font-size: 0.95rem;
    }

    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: box-shadow 0.15s;
    }

    .btn-google:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); }

    .btn-google svg { width: 20px; height: 20px; }

    /* ── User bar ── */
    #userBar {
      display: none;
      width: 100%;
      max-width: 480px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #userBar.visible { display: flex; }

    #userName {
      font-size: 0.82rem;
      color: #888;
    }

    .btn-signout {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: #888;
      cursor: pointer;
    }

    .btn-signout:hover { background: #f5f5f5; }

    /* ── Main app (hidden until signed in) ── */
    #app { display: none; width: 100%; align-items: center; flex-direction: column; }
    #app.visible { display: flex; }

    /* ── Card ── */
    .card-container {
      perspective: 1000px;
      width: 100%;
      max-width: 480px;
      height: 260px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    .card-front { background: #ffffff; }

    .card-back {
      background: #4f46e5;
      color: #fff;
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 10px;
    }

    .card-text {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.4;
      width: 100%;
      overflow-y: auto;
      max-height: 160px;
      word-break: break-word;
    }

    .card-back .card-text {
      font-size: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: none;
    }

    .card-hint {
      font-size: 0.72rem;
      opacity: 0.4;
      margin-top: 14px;
    }

    /* ── Counter ── */
    .counter {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 16px;
    }

    /* ── Nav buttons ── */
    .nav {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.3; cursor: default; }

    .btn-nav {
      background: #fff;
      color: #1a1a2e;
      padding: 11px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .btn-nav:hover:not(:disabled) { background: #f5f5f5; }

    .btn-delete {
      background: #fff0f0;
      color: #ef4444;
      padding: 11px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .btn-delete:hover:not(:disabled) { background: #ffe4e4; }

    /* ── Add card form ── */
    .add-section {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .add-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #444;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input, textarea {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-color: #4f46e5; }

    .btn-add {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .btn-add:hover { opacity: 0.88; }

    .status {
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 20px;
      color: #22c55e;
      text-align: center;
    }

    .status.err { color: #ef4444; }
  </style>
</head>
<body>

  <h1>✦ Flashcards</h1>

  <!-- Login screen -->
  <div id="loginScreen">
    <p>Sign in to access your flashcards</p>
    <button class="btn-google" onclick="signIn()">
      <!-- Google logo -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.08-6.08C34.46 3.1 29.5 1 24 1 14.82 1 7.07 6.48 3.76 14.22l7.1 5.52C12.6 13.67 17.84 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.74H24v8.98h12.67c-.55 2.94-2.2 5.43-4.68 7.1l7.18 5.58C43.36 37.6 46.52 31.5 46.52 24.5z"/>
        <path fill="#FBBC05" d="M10.86 28.26A14.57 14.57 0 0 1 9.5 24c0-1.48.26-2.92.72-4.26l-7.1-5.52A23.93 23.93 0 0 0 0 24c0 3.86.92 7.5 2.56 10.72l8.3-6.46z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.48-4.94l-7.18-5.58c-1.83 1.23-4.17 1.96-6.3 1.96-6.16 0-11.4-4.17-13.14-9.78l-8.3 6.46C7.07 41.52 14.82 47 24 47z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- User bar -->
  <div id="userBar">
    <span id="userName"></span>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>

  <!-- Main app -->
  <div id="app">
    <div class="card-container" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <span class="card-label">Front</span>
          <span class="card-text" id="frontText">Loading…</span>
          <span class="card-hint">tap to flip</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label" style="color:rgba(255,255,255,0.6)">Back</span>
          <span class="card-text" id="backText"></span>
        </div>
      </div>
    </div>

    <div class="counter" id="counter"></div>

    <div class="nav">
      <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">← Prev</button>
      <button class="btn-delete" id="btnDelete" onclick="deleteCard()">Delete</button>
      <button class="btn-nav" id="btnNext" onclick="navigate(1)">Next →</button>
    </div>

    <div class="add-section">
      <h2>Add a card</h2>
      <div class="field">
        <label for="inputFront">Front</label>
        <input id="inputFront" type="text" placeholder="e.g. ephemeral" />
      </div>
      <div class="field">
        <label for="inputBack">Back</label>
        <textarea id="inputBack" rows="3" placeholder="e.g. lasting for a very short time"></textarea>
      </div>
      <button class="btn-add" onclick="addCard()">Add Card</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, getDocs, deleteDoc, doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCLkKfsJQLgB1U3SZxmejpGkqpw8las154",
      authDomain: "vocabulary-33643.firebaseapp.com",
      projectId: "vocabulary-33643",
      storageBucket: "vocabulary-33643.firebasestorage.app",
      messagingSenderId: "651393781868",
      appId: "1:651393781868:web:1dd3c7dae9828efe7a4849",
      measurementId: "G-ZCY064CLZ7"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const COL  = "cards";

    // ── State ──────────────────────────────────────────────
    let cards = [];
    let order = [];
    let pos   = 0;

    // ── Auth ───────────────────────────────────────────────
    window.signIn = async function() {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) {
        alert("Sign-in failed: " + e.message);
      }
    };

    window.signOut = () => fbSignOut(auth);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("userBar").classList.add("visible");
        document.getElementById("app").classList.add("visible");
        document.getElementById("userName").textContent = user.displayName || user.email;
        loadCards();
      } else {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("userBar").classList.remove("visible");
        document.getElementById("app").classList.remove("visible");
        cards = []; order = []; pos = 0;
      }
    });

    // ── Load ───────────────────────────────────────────────
    async function loadCards() {
      document.getElementById("frontText").textContent = "Loading…";
      const snap = await getDocs(collection(db, COL));
      cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      shuffle();
      render();
    }

    function shuffle() {
      order = cards.map((_, i) => i);
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      pos = 0;
    }

    function render() {
      document.getElementById("card").classList.remove("flipped");

      if (cards.length === 0) {
        document.getElementById("frontText").textContent = "No cards yet — add one below!";
        document.getElementById("backText").textContent  = "";
        document.getElementById("counter").textContent   = "";
        document.getElementById("btnPrev").disabled = true;
        document.getElementById("btnDelete").disabled = true;
        document.getElementById("btnNext").disabled = true;
        return;
      }

      const c = cards[order[pos]];
      document.getElementById("frontText").textContent = c.front;
      document.getElementById("backText").textContent  = c.back;
      document.getElementById("counter").textContent   = `${pos + 1} / ${cards.length}`;
      document.getElementById("btnPrev").disabled = pos === 0;
      document.getElementById("btnDelete").disabled = false;
      document.getElementById("btnNext").disabled = pos === cards.length - 1;
    }

    // ── Navigation ─────────────────────────────────────────
    window.navigate = function(dir) {
      const next = pos + dir;
      if (next < 0 || next >= cards.length) return;
      pos = next;
      render();
    };

    window.flipCard = function() {
      if (cards.length === 0) return;
      document.getElementById("card").classList.toggle("flipped");
    };

    // ── Delete card ────────────────────────────────────────
    window.deleteCard = async function() {
      if (cards.length === 0) return;
      const c = cards[order[pos]];
      if (!confirm(`Delete "${c.front}"?`)) return;

      await deleteDoc(doc(db, COL, c.id));

      const deletedIdx = order[pos];
      cards.splice(deletedIdx, 1);
      // rebuild order without the deleted index, adjusting for shift
      order = order
        .filter(i => i !== deletedIdx)
        .map(i => i > deletedIdx ? i - 1 : i);
      if (pos >= order.length) pos = Math.max(0, order.length - 1);
      render();
    };

    // ── Add card ───────────────────────────────────────────
    window.addCard = async function() {
      const front  = document.getElementById("inputFront").value.trim();
      const back   = document.getElementById("inputBack").value.trim();
      const status = document.getElementById("status");

      if (!front || !back) {
        status.textContent = "Both fields are required.";
        status.className = "status err";
        return;
      }

      status.textContent = "Saving…";
      status.className = "status";

      try {
        const ref = await addDoc(collection(db, COL), { front, back });
        cards.push({ id: ref.id, front, back });
        order.push(cards.length - 1);
        document.getElementById("inputFront").value = "";
        document.getElementById("inputBack").value  = "";
        status.textContent = "Card added!";
        render();
      } catch (e) {
        status.textContent = "Error: " + e.message;
        status.className = "status err";
      }
    };
  </script>
</body>
</html>
